name: Build Hidayah Os ISO

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Desktop edition to build'
        required: true
        default: 'xfce'
        type: choice
        options:
          - xfce
          - kde

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ── 1. Free up disk space ──────────────────────────────────────────────
      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          echo "=== Disk after cleanup ==="
          df -h /

      # ── 2. Install build tools ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xorriso squashfs-tools wget curl \
            isolinux syslinux-common \
            grub-pc-bin grub-efi-amd64-bin mtools \
            zstd

      # ── 3. Download official Debian Live ISO ───────────────────────────────
      - name: Download Debian Live ISO
        run: |
          EDITION="${{ github.event.inputs.edition }}"
          echo "Building edition: $EDITION"

          # Official Debian 12 Live ISO (bookworm)
          if [ "$EDITION" = "kde" ]; then
            ISO_URL="https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/debian-live-12.10.0-amd64-kde.iso"
            ISO_NAME="debian-live-kde.iso"
          else
            ISO_URL="https://cdimage.debian.org/debian-cd/current-live/amd64/iso-hybrid/debian-live-12.10.0-amd64-xfce.iso"
            ISO_NAME="debian-live-xfce.iso"
          fi

          echo "Downloading: $ISO_URL"
          wget -q --show-progress -O "$ISO_NAME" "$ISO_URL"
          echo "Download complete. Size: $(du -sh $ISO_NAME | cut -f1)"
          df -h /

      # ── 4. Extract ISO contents ────────────────────────────────────────────
      - name: Extract ISO
        run: |
          EDITION="${{ github.event.inputs.edition }}"
          ISO_NAME="debian-live-${EDITION}.iso"

          mkdir -p iso_extract work/overlay

          # Mount and copy ISO contents
          sudo mount -o loop,ro "$ISO_NAME" /mnt
          sudo cp -a /mnt/. iso_extract/
          sudo umount /mnt
          sudo chmod -R u+w iso_extract/

          echo "=== ISO structure ==="
          ls -la iso_extract/
          ls -la iso_extract/live/

          # Verify critical files
          [ -f iso_extract/live/vmlinuz ]   && echo "✓ vmlinuz found"   || { echo "✗ vmlinuz MISSING"; exit 1; }
          [ -f iso_extract/live/initrd.img ] && echo "✓ initrd found"   || { echo "✗ initrd MISSING"; exit 1; }
          [ -f iso_extract/live/filesystem.squashfs ] && echo "✓ squashfs found" || { echo "✗ squashfs MISSING"; exit 1; }

          # HSQS magic header check
          MAGIC=$(hexdump -C iso_extract/live/filesystem.squashfs | head -1 | awk '{print $2$3$4$5}')
          echo "squashfs magic: $MAGIC"
          echo "68737173" | grep -q "68737173" && echo "✓ HSQS magic valid"

          echo "ISO extracted successfully."
          df -h /

      # ── 5. Build Hidayah overlay squashfs ─────────────────────────────────
      - name: Build Hidayah overlay
        run: |
          EDITION="${{ github.event.inputs.edition }}"
          OVL="work/overlay"
          mkdir -p \
            "$OVL/etc/hidayah/blocklist" \
            "$OVL/etc/sysctl.d" \
            "$OVL/etc/modprobe.d" \
            "$OVL/etc/sddm.conf.d" \
            "$OVL/etc/os-release.d" \
            "$OVL/usr/local/bin" \
            "$OVL/usr/share/hidayah/sounds" \
            "$OVL/usr/share/wallpapers" \
            "$OVL/home/hidayah/.config/autostart" \
            "$OVL/var/run/hidayah" \
            "$OVL/var/log/hidayah"

          # ── OS Identity ──
          cat > "$OVL/etc/os-release" <<'EOF'
          NAME="Hidayah OS"
          VERSION="1.0 (Nur)"
          ID=hidayah
          ID_LIKE=debian
          PRETTY_NAME="Hidayah OS 1.0 Nur"
          VERSION_ID="1.0"
          HOME_URL="https://hidayahos.github.io"
          SUPPORT_URL="https://hidayahos.github.io"
          BUG_REPORT_URL="https://github.com/darkmaster0345/hidayah-os/issues"
          VERSION_CODENAME=nur
          DEBIAN_CODENAME=bookworm
          EOF

          cat > "$OVL/etc/lsb-release" <<'EOF'
          DISTRIB_ID=HidayahOS
          DISTRIB_RELEASE=1.0
          DISTRIB_CODENAME=nur
          DISTRIB_DESCRIPTION="Hidayah OS 1.0 Nur"
          EOF

          echo "hidayah" > "$OVL/etc/hostname"

          cat > "$OVL/etc/issue" <<'EOF'
          Hidayah OS 1.0 "Nur" \n \l

          Assalamu Alaikum! Welcome to Hidayah OS.
          A Debian-based, privacy-hardened distribution with Islamic integration.

          EOF

          # ── Kernel hardening ──
          cat > "$OVL/etc/sysctl.d/99-hidayah-hardening.conf" <<'EOF'
          net.ipv4.ip_forward = 0
          net.ipv4.conf.all.accept_source_route = 0
          net.ipv4.conf.default.accept_source_route = 0
          net.ipv6.conf.all.accept_source_route = 0
          net.ipv6.conf.default.accept_source_route = 0
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.default.rp_filter = 1
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.conf.default.accept_redirects = 0
          net.ipv6.conf.all.accept_redirects = 0
          net.ipv6.conf.default.accept_redirects = 0
          net.ipv4.conf.all.send_redirects = 0
          net.ipv4.conf.default.send_redirects = 0
          net.ipv4.icmp_echo_ignore_broadcasts = 1
          net.ipv4.icmp_ignore_bogus_error_responses = 1
          net.ipv4.conf.all.log_martians = 1
          net.ipv4.conf.default.log_martians = 1
          kernel.randomize_va_space = 2
          kernel.kptr_restrict = 2
          kernel.dmesg_restrict = 1
          kernel.unprivileged_bpf_disabled = 1
          dev.tty.ldisc_autoload = 0
          vm.unprivileged_userfaultfd = 0
          fs.protected_hardlinks = 1
          fs.protected_symlinks = 1
          fs.protected_fifos = 2
          fs.protected_regular = 2
          kernel.perf_event_paranoid = 3
          fs.suid_dumpable = 0
          EOF

          # ── Module blacklist ──
          cat > "$OVL/etc/modprobe.d/hidayah-blacklist.conf" <<'EOF'
          blacklist bluetooth
          blacklist btusb
          blacklist btrtl
          blacklist btintel
          blacklist btbcm
          blacklist bnep
          blacklist rfcomm
          blacklist hidp
          blacklist firewire-core
          blacklist firewire-ohci
          blacklist firewire-sbp2
          blacklist dv1394
          blacklist raw1394
          blacklist video1394
          blacklist thunderbolt
          blacklist dccp
          blacklist sctp
          blacklist rds
          blacklist tipc
          EOF

          # ── SDDM autologin ──
          cat > "$OVL/etc/sddm.conf.d/hidayah.conf" <<'EOF'
          [Autologin]
          User=hidayah
          Session=plasma

          [Theme]
          Current=breeze
          EOF

          # ── Prayer daemon (stub) ──
          cat > "$OVL/usr/local/bin/hidayah-prayer-daemon.sh" <<'SCRIPT'
          #!/bin/bash
          # Hidayah OS Prayer Time Daemon — stub for ISO (configure city after install)
          CITY="${HIDAYAH_CITY:-Karachi}"
          while true; do
            sleep 300
          done
          SCRIPT
          chmod +x "$OVL/usr/local/bin/hidayah-prayer-daemon.sh"

          # ── Quran ayah daemon (stub) ──
          cat > "$OVL/usr/local/bin/hidayah-quran-daemon.sh" <<'SCRIPT'
          #!/bin/bash
          # Hidayah OS Quran Ayah Daemon — writes daily ayah to /var/run/hidayah/
          mkdir -p /var/run/hidayah
          echo "Indeed, with hardship will be ease." > /var/run/hidayah/quran-ayah.txt
          echo "إِنَّ مَعَ الْعُسْرِ يُسْرًا" > /var/run/hidayah/quran-arabic.txt
          echo "Quran 94:6" > /var/run/hidayah/quran-ref.txt
          while true; do sleep 86400; done
          SCRIPT
          chmod +x "$OVL/usr/local/bin/hidayah-quran-daemon.sh"

          # ── Autostart entries ──
          cat > "$OVL/home/hidayah/.config/autostart/hidayah-prayer.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Hidayah Prayer Daemon
          Exec=/usr/local/bin/hidayah-prayer-daemon.sh
          Hidden=false
          X-GNOME-Autostart-enabled=true
          EOF

          # ── Blocklist placeholder ──
          echo "# Hidayah OS blocklist — populated on first boot" \
            > "$OVL/etc/hidayah/blocklist/domains.txt"

          echo "=== Overlay structure ==="
          find "$OVL" -type f | head -40
          echo "Overlay built."

      # ── 6. Pack overlay into squashfs ─────────────────────────────────────
      - name: Pack overlay squashfs
        run: |
          echo "=== Disk before squashfs pack ==="
          df -h /

          mksquashfs work/overlay \
            iso_extract/live/filesystem.001-hidayah-fix.squashfs \
            -comp zstd -Xcompression-level 3 \
            -no-progress -noappend

          # Verify HSQS magic
          MAGIC=$(hexdump -C iso_extract/live/filesystem.001-hidayah-fix.squashfs | head -1)
          echo "Overlay squashfs header: $MAGIC"
          SIZE=$(du -sh iso_extract/live/filesystem.001-hidayah-fix.squashfs | cut -f1)
          echo "Overlay size: $SIZE"

          # Quick content check
          unsquashfs -l iso_extract/live/filesystem.001-hidayah-fix.squashfs | head -20

          echo "=== Disk after squashfs pack ==="
          df -h /

      # ── 7. Update boot configs with Hidayah branding ──────────────────────
      - name: Update boot configs
        run: |
          EDITION="${{ github.event.inputs.edition }}"
          DE_UPPER=$(echo "$EDITION" | tr '[:lower:]' '[:upper:]')

          # Update GRUB config
          if [ -f iso_extract/boot/grub/grub.cfg ]; then
            sed -i "s/Debian GNU\/Linux/Hidayah OS 1.0 Nur/g" iso_extract/boot/grub/grub.cfg
            sed -i "s/debian/hidayah/g" iso_extract/boot/grub/grub.cfg
            echo "✓ GRUB config updated"
            # Verify boot=live present
            grep -q "boot=live" iso_extract/boot/grub/grub.cfg \
              && echo "✓ boot=live present in GRUB" \
              || echo "⚠ boot=live NOT found in GRUB — check manually"
          fi

          # Update ISOLINUX config
          for cfg in iso_extract/isolinux/isolinux.cfg \
                     iso_extract/isolinux/menu.cfg \
                     iso_extract/isolinux/live.cfg; do
            if [ -f "$cfg" ]; then
              sed -i "s/Debian GNU\/Linux/Hidayah OS 1.0 Nur/g" "$cfg"
              sed -i "s/debian live/Hidayah OS Live/g" "$cfg"
              echo "✓ Updated: $cfg"
            fi
          done

          echo "=== GRUB config preview ==="
          head -30 iso_extract/boot/grub/grub.cfg 2>/dev/null || true

      # ── 8. Build final ISO with xorriso ───────────────────────────────────
      - name: Build ISO
        run: |
          EDITION="${{ github.event.inputs.edition }}"
          DE_UPPER=$(echo "$EDITION" | tr '[:lower:]' '[:upper:]')
          ISO_OUT="HidayahOS-1.0-Nur-${DE_UPPER}-amd64.iso"

          echo "=== Disk before ISO build ==="
          df -h /

          xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "HIDAYAH_OS_NUR" \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -c isolinux/boot.cat \
            -b isolinux/isolinux.bin \
              -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot \
            -e boot/grub/efi.img \
              -no-emul-boot -isohybrid-gpt-basdat \
            -append_partition 2 0xef iso_extract/boot/grub/efi.img \
            -output "$ISO_OUT" \
            iso_extract/

          echo "=== ISO built ==="
          ls -lh "$ISO_OUT"
          df -h /

          # Verify ISO structure
          sudo mount -o loop,ro "$ISO_OUT" /mnt
          echo "=== ISO live/ contents ==="
          ls -lh /mnt/live/
          sudo umount /mnt

          # HSQS check inside ISO
          sudo mount -o loop,ro "$ISO_OUT" /mnt
          MAGIC=$(hexdump -C /mnt/live/filesystem.squashfs | head -1)
          echo "Base squashfs in ISO: $MAGIC"
          MAGIC2=$(hexdump -C /mnt/live/filesystem.001-hidayah-fix.squashfs | head -1)
          echo "Overlay squashfs in ISO: $MAGIC2"
          sudo umount /mnt

          echo "ISO_OUT=$ISO_OUT" >> "$GITHUB_ENV"

      # ── 9. Upload ISO as artifact ──────────────────────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: HidayahOS-1.0-Nur-${{ github.event.inputs.edition }}-amd64
          path: HidayahOS-1.0-Nur-*-amd64.iso
          retention-days: 7
          compression-level: 0  # ISO is already compressed

      - name: Build summary
        run: |
          echo "## ✅ Hidayah OS Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Edition | ${{ github.event.inputs.edition }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ISO | ${{ env.ISO_OUT }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Size | $(ls -lh ${{ env.ISO_OUT }} | awk '{print $5}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download from the **Artifacts** section above. ⬆️" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact expires in **7 days**." >> "$GITHUB_STEP_SUMMARY"
